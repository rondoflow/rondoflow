name: Bug report
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: search
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched the existing issues and this has not already been reported.
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug, including any error messages.
      placeholder: When I ran a workflow, the agent never produced output and the run stayed "active" forever.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Run `npm run setup`
        2. Start with `npm run dev`
        3. Drag an agent onto the canvas and connect a skill
        4. Click Run
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: The agent should produce output and the run should complete.
    validations:
      required: true

  - type: dropdown
    id: deployment-mode
    attributes:
      label: Deployment mode
      description: How are you running RondoFlow?
      options:
        - Local dev (npm run dev)
        - Full Docker (docker compose up)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The RondoFlow version (e.g. 0.1.0) or the git commit SHA you are on.
      placeholder: 0.1.0 or ff757cb
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL2)
        - Windows (native)
        - Other
    validations:
      required: true

  - type: dropdown
    id: claude-auth
    attributes:
      label: Claude auth method
      description: Which credential is configured for the Claude Code CLI?
      options:
        - ANTHROPIC_API_KEY
        - CLAUDE_CODE_OAUTH_TOKEN (claude setup-token)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be rendered as a shell code block, so no need for backticks. Tip - set `RONDOFLOW_DEBUG_SPAWN=1` for spawn diagnostics.
      render: shell
    validations:
      required: false
